apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres.secretName" . }}
data:
  db-name: {{ "onedev" | b64enc | quote }}
  db-user: {{ "onedev" | b64enc | quote }}
  {{- if .Release.IsInstall }}
  db-password: {{ randAlphaNum 15 | b64enc | quote }}
  {{ else }}
  # `index` function is necessary because the property name contains a dash.
  # Otherwise (...).data.db_password would have worked too.
  db-password:  {{ index (lookup "v1" "Secret" .Release.Namespace (include "postgres.secretName" .)).data "db-password" }}
  {{ end }}
