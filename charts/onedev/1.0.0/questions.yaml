groups:
  - name: "OneDev Configuration"
    description: "Configure OneDev"
  - name: "OneDev Environment Variables"
    description: "Set the environment that will be visible to the container"
  - name: "Networking"
    description: "Configure Networking for OneDev"
  - name: "OneDev Storage"
    description: "Configure Storage for OneDev"
  - name: "Scaling/Upgrade Policy"
    description: "Configure how pods are replaced when configuration is upgraded"
  - name: "Advanced DNS Settings"
    description: "Configure DNS settings"

# portals:
#   web_portal:
#     protocols:
#       - "$kubernetes-resource_configmap_nginx-configuration_protocol"
#     host:
#       - "$variable-nextcloud.host"
#     ports:
#       - "$variable-service.nodePort"

questions:
  # Update strategy
  - variable: updateStrategy
    description: "Upgrade Policy"
    label: "Update Strategy"
    group: "Scaling/Upgrade Policy"
    schema:
      type: string
      default: "Recreate"
      enum:
        - value: "RollingUpdate"
          description: "Create new pods and then kill old ones"
        - value: "Recreate"
          description: "Kill existing pods before creating new ones"

  - variable: dnsConfig
    label: "DNS Configuration"
    group: "Advanced DNS Settings"
    schema:
      type: dict
      attrs:
        - variable: options
          label: "DNS Options"
          schema:
            type: list
            items:
              - variable: optionsEntry
                label: "Option Entry Configuration"
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: "Option Name"
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: "Option Value"
                      schema:
                        type: string
                        required: true

  - variable: useEmbeddedDatabase
    label: "Use External Database"
    group: "OneDev Configuration"
    schema:
      type: boolean
      default: false
      show_subquestions_if: true
      subquestions:
        - variable: hibernateDialect
          label: "Hibernate Dialect"
          schema:
            type: string
            default: "org.hibernate.dialect.MySQL5InnoDBDialect"
            required: true
            enum:
              - value: "org.hibernate.dialect.MySQL5InnoDBDialect"
                description: "MySQL Dialect"
              - value: "io.onedev.server.persistence.PostgreSQLDialect"
                description: "PostgreSQL Dialect"
              - value: "org.hibernate.dialect.MySQL5InnoDBDialect"
                description: "MariaDB Dialect"
              - value: "org.hibernate.dialect.SQLServer2012Dialect"
                description: "SQLServer Dialect"
              - value: "org.hibernate.dialect.Oracle10gDialect"
                description: "Oracle Dialect"
        - variable: hibernateConnectionDriverClass
          label: "Hibernate Connection Driver Class"
          schema:
            type: string
            default: "org.hibernate.dialect.MySQL5InnoDBDialect"
            required: true
            enum:
              - value: "com.mysql.cj.jdbc.Driver"
                description: "MySQL Driver"
              - value: "org.postgresql.Driver"
                description: "PostgreSQL Driver"
              - value: "org.mariadb.jdbc.Driver"
                description: "MariaDB Driver"
              - value: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
                description: "SQLServer Driver"
              - value: "oracle.jdbc.driver.OracleDriver"
                description: "Oracle Driver"
        - variable: hibernateConnectionUrl
          label: "Hibernate Connection Url"
          schema:
            type: string
            default: ""
            required: true
        - variable: hibernateConnectionUsername
          label: "Hibernate Connection Username"
          schema:
            type: string
            default: ""
            required: true
        - variable: hibernateConnectionPassword
          label: "Hibernate Connection Password"
          schema:
            type: string
            default: ""
            required: true
            private: true
        - variable: hibernateHikariMaximumPoolSize
          label: "Hibernate Hikari Maximum Pool Size"
          schema:
            type: string
            default: "25"
            required: true

  - variable: environmentVariables
    label: "OneDev Environment Variables"
    group: "OneDev Configuration"
    schema:
      type: list
      default: []
      items:
        - variable: environmentVariable
          label: "Environment Variable"
          schema:
            type: dict
            attrs:
              - variable: name
                label: "Name"
                schema:
                  type: string
              - variable: value
                label: "Value"
                schema:
                  type: string

  # - variable: service
  #   description: "OneDev Service Configuration"
  #   label: "OneDev Service Configuration"
  #   group: "OneDev Configuration"
  #   schema:
  #     type: dict
  #     required: true
  #     attrs:
  #       - variable: webPort
  #         label: "HTTP Port"
  #         schema:
  #           type: int
  #           default: 6610
  #           required: true
  #       - variable: sshPort
  #         label: "SSH Port"
  #         schema:
  #           type: int
  #           default: 6611
  #           required: true

  - variable: appVolumeMounts
    label: "OneDev Storage"
    group: "OneDev Storage"
    schema:
      type: dict
      attrs:
        - variable: onedev-data
          label: "OneDev Data Volume"
          schema:
            type: dict
            attrs:
              - variable: datasetName
                label: "OneDev Data Volume Name"
                schema:
                  type: string
                  hidden: true
                  $ref:
                    - "normalize/ixVolume"
                  show_if: [["hostPathEnabled", "=", false]]
                  default: "ix-onedev_data"
                  editable: false
              - variable: mountPath
                label: "OneDev Data Mount Path"
                description: "Path where the volume will be mounted inside the pod"
                schema:
                  type: path
                  hidden: true
                  editable: false
                  default: "/opt/onedev"
              - variable: hostPathEnabled
                label: "Enable Host Path for OneDev Data Volume"
                schema:
                  type: boolean
                  default: false
                  show_subquestions_if: true
                  subquestions:
                    - variable: hostPath
                      label: "Host Path for OneDev Data Volume"
                      schema:
                        type: hostpath
                        required: true

  - variable: postgresAppVolumeMounts
    label: "Postgres Storage"
    group: "OneDev Storage"
    show_if: [["useExternalDatabase", "=", false]]
    schema:
      type: dict
      attrs:
        - variable: postgres-data
          label: "Postgres Data Volume"
          schema:
            type: dict
            attrs:
              - variable: datasetName
                label: "Postgres Data Volume Name"
                schema:
                  type: string
                  hidden: true
                  $ref:
                    - "normalize/ixVolume"
                  show_if: [["hostPathEnabled", "=", false]]
                  default: "ix-postgres_data"
                  editable: false
              - variable: mountPath
                label: "Postgresql Data Mount Path"
                description: "Path where the volume will be mounted inside the pod"
                schema:
                  type: path
                  hidden: true
                  editable: false
                  default: "/var/lib/postgresql/data"
              - variable: hostPathEnabled
                label: "Enable Host Path for OneDev Postgres Data Volume Name"
                schema:
                  type: boolean
                  default: false
                  show_subquestions_if: true
                  subquestions:
                    - variable: hostPath
                      label: "Host Path for OneDev Postgres Data Volume Name"
                      schema:
                        type: hostpath
                        required: true
        - variable: postgres-backup
          label: "Postgres Backup Volume"
          schema:
            type: dict
            attrs:
              - variable: datasetName
                label: "Postgres Backup Volume Name"
                schema:
                  type: string
                  hidden: true
                  $ref:
                    - "normalize/ixVolume"
                  show_if: [["hostPathEnabled", "=", false]]
                  default: "ix-postgres_backups"
                  editable: false
              - variable: mountPath
                label: "Postgresql Backup Mount Path"
                description: "Path where the volume will be mounted inside the pod"
                schema:
                  type: path
                  hidden: true
                  editable: false
                  default: "/postgres_backups"
              - variable: hostPathEnabled
                label: "Enable Host Path for OneDev Postgres Backup Volume Name"
                schema:
                  type: boolean
                  default: false
                  show_subquestions_if: true
                  subquestions:
                    - variable: hostPath
                      label: "Host Path for OneDev Postgres Backup Volume Name"
                      schema:
                        type: hostpath
                        required: true
